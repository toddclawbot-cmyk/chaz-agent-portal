  <rect x="14" y="16" width="28" height="20" rx="3" stroke="#b5694a" stroke-width="1.5" fill="none"/>
  <rect x="22" y="24" width="20" height="16" rx="3" stroke="#e8d5c4" stroke-width="1.5" fill="none" stroke-opacity="0.6"/>
  <!-- Connection dots -->
  <circle cx="10" cy="18" r="1.5" fill="#e8d5c4" fill-opacity="0.5"/>
  <circle cx="18" cy="26" r="1.5" fill="#e8d5c4" fill-opacity="0.5"/>
  <circle cx="26" cy="32" r="1.5" fill="#e8d5c4" fill-opacity="0.5"/>
